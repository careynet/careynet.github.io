<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Settings - The Carey Network</title>

<link rel="apple-touch-icon" href="/images/icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Carey Network">

<link rel="icon" href="/images/icon.png">
<link rel="manifest" href="/manifest.json">

<link rel="stylesheet" href="../css/style.css" />

<style>
.settings-menu {
  background: rgba(0,0,0,0.5);
  backdrop-filter: blur(12px);
  border-radius: 20px;
  padding: 40px;
  max-width: 700px;
  width: 90%;
  margin: 0 auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 25px;
  box-shadow: 0 0 20px rgba(230,92,0,0.3);
}

.setting-card {
  background: rgba(17,17,17,0.75);
  border-radius: 18px;
  padding: 30px;
  text-align: center;
  color: #fff;
  cursor: pointer;
  min-height: 150px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease;
}

.setting-card h3 {
  margin-bottom: 15px;
  font-size: 1.4rem;
}

.setting-card:hover {
  transform: translateY(-4px);
  background: rgba(230,92,0,0.15);
  box-shadow: 0 0 12px #e65c00, 0 0 25px rgba(230,92,0,0.5);
}

.setting-card button {
  padding: 16px 32px;
  border: none;
  border-radius: 14px;
  background: #e65c00;
  color: #fff;
  font-weight: 700;
  font-size: 1.2rem;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
  box-shadow: 0 0 12px #e65c00, 0 0 25px rgba(230,92,0,0.5);
}

.setting-card button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px #fff, 0 0 40px #e65c00;
}

.toggle-switch {
  position: relative;
  width: 70px;
  height: 36px;
  display: inline-block;
}

.toggle-switch input {
  opacity: 0;
  width: 0;
  height: 0;
}

.slider {
  position: absolute;
  cursor: pointer;
  top: 0; left: 0;
  right: 0; bottom: 0;
  background: #333;
  border-radius: 34px;
  transition: background 0.3s ease, box-shadow 0.3s ease;
  box-shadow: inset 0 2px 4px rgba(0,0,0,0.6);
}

.slider:before {
  position: absolute;
  content: "";
  height: 30px;
  width: 30px;
  left: 3px;
  bottom: 3px;
  background-color: #fff;
  border-radius: 50%;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
}

input:checked + .slider {
  background: #e65c00;
  box-shadow: 0 0 10px rgba(230,92,0,0.7), inset 0 2px 4px rgba(0,0,0,0.6);
}

input:checked + .slider:before {
  transform: translateX(34px);
}

@keyframes glowPulse {
  0%   { box-shadow: 0 0 8px rgba(230,92,0,0.7); }
  50%  { box-shadow: 0 0 16px rgba(230,92,0,0.9); }
  100% { box-shadow: 0 0 8px rgba(230,92,0,0.7); }
}
</style>
</head>

<body>

<header class="site-header">
  <img src="../images/logo.png" class="logo" />
</header>

<main>
  <section class="hero orange-bg">
    <div class="settings-menu">

      <div class="setting-card">
        <h3>Cloak</h3>
        <button onclick="openCloak()">Activate</button>
      </div>

      <div class="setting-card">
        <h3>Auto Cloak</h3>
        <label class="toggle-switch">
          <input type="checkbox">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-card">
        <h3>Panic Button</h3>
        <label class="toggle-switch">
          <input type="checkbox" id="panicToggle">
          <span class="slider"></span>
        </label>
      </div>

      <div class="setting-card">
        <h3>Web-App Mode</h3>
        <label class="toggle-switch">
          <input type="checkbox" disabled>
          <span class="slider"></span>
        </label>
      </div>

    </div>
  </section>
</main>

<div id="nav-container"></div>

<footer class="site-footer">
  <p>&copy; 2026 The Carey Network.</p>
</footer>

<!-- Cloak function defined inline so it is always available immediately -->
<script>
function openCloak() {
  var win = window.open("", "_blank");
  if (!win) {
    window.location.replace("https://google.com");
    return;
  }
  var iframe = win.document.createElement("iframe");
  iframe.style.cssText = "position:absolute;top:0;left:0;width:100%;height:100%;border:none;";
  iframe.src = "https://carey-net.github.io";
  win.document.body.style.margin = "0";
  win.document.body.style.height = "100vh";
  win.document.body.appendChild(iframe);
  win.document.title = "about:blank";
  window.location.replace("https://google.com");
}
</script>

<!-- main.js handles nav, transitions, panic injection, and toggle sync -->
<script src="/js/main.js"></script>

</body>
</html>
